services:
  db:
    image: postgres:16-alpine
    container_name: labyrinthine_postgres
    restart: "no"
    environment:
      POSTGRES_USER: labyrinthine_user
      POSTGRES_PASSWORD: labyrinthine_password
      POSTGRES_DB: labyrinthine_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
